# Simplified release workflow for codex-rs.
# To release:
# ```
# git tag -a rust-v0.1.0 -m "Release 0.1.0"
# git push origin rust-v0.1.0
# ```

name: rust-release
on:
  push:
    tags:
      - "rust-v*.*.*"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: Build - x86_64-unknown-linux-musl
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: x86_64-unknown-linux-musl

      - name: Use hermetic Cargo home (musl)
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.14.0
          use-cache: false

      - name: Install musl build tools
        env:
          TARGET: x86_64-unknown-linux-musl
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - name: Disable aws-lc jitter entropy (musl)
        shell: bash
        run: |
          set -euo pipefail
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY_x86_64_unknown_linux_musl=1" >> "$GITHUB_ENV"

      - name: Configure rusty_v8 artifact overrides
        uses: ./.github/actions/setup-rusty-v8
        with:
          target: x86_64-unknown-linux-musl

      - name: Cargo build
        shell: bash
        run: |
          set -euo pipefail
          cargo build --target x86_64-unknown-linux-musl --release --bin codex

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/x86_64-unknown-linux-musl/release/codex" "dist/codex-x86_64-unknown-linux-musl"
          chmod +x "dist/codex-x86_64-unknown-linux-musl"

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-x86_64-unknown-linux-musl
          path: codex-rs/dist/*
          if-no-files-found: error

  release:
    needs: build
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codex-x86_64-unknown-linux-musl
          path: dist

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          notes_path="${RUNNER_TEMP}/release-notes.md"
          git log -1 --format=%B "${commit}" > "${notes_path}"
          echo >> "${notes_path}"
          echo "path=${notes_path}" >> "$GITHUB_OUTPUT"

      - name: Define release name
        id: release_name
        run: |
          version="${GITHUB_REF_NAME#rust-v}"
          echo "name=${version}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: ${{ steps.release_name.outputs.name }}
          tag_name: ${{ github.ref_name }}
          body_path: ${{ steps.release_notes.outputs.path }}
          files: dist/*
          overwrite_files: true
          make_latest: ${{ !contains(steps.release_name.outputs.name, '-') }}
          prerelease: ${{ contains(steps.release_name.outputs.name, '-') }}
